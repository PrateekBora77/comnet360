server:
  port: 8081

spring:
  application:
    name: iam-service

  datasource:
    url: jdbc:mysql://localhost:3306/iam_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Rahul@1809
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# JWT config ? must match gateway's jwt.secret exactly
jwt:
  secret: "3a7f9c2b8e1d4f6a0c5b9e3d7f2a8c1b4e6f0a3d9c7b2e5f8a1d4c6b0e3f7a2d"
  expiration: 86400000       # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.comnet360.iam: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  show-actuator: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}