server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      # Global CORS — allows React (localhost:5173) to call the gateway
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      # Routes — each route forwards requests to the correct microservice
      # uri changed from http://localhost:808X to lb://service-name
      # lb:// tells Spring Cloud Gateway to resolve via Eureka
      routes:

        # ── IAM Service ──────────────────────────────────────────
        # Public routes — no JWT needed
        - id: iam-auth
          uri: lb://iam-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # Protected routes — JWT required
        - id: iam-users
          uri: lb://iam-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: iam-audit
          uri: lb://iam-service
          predicates:
            - Path=/api/audit-logs/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        # ── Provisioning Service ─────────────────────────────────
        - id: provisioning
          uri: lb://provisioning-service
          predicates:
            - Path=/api/services/**, /api/configurations/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        # ── Usage & SLA Service ──────────────────────────────────
        - id: usage-sla
          uri: lb://usage-sla-service
          predicates:
            - Path=/api/usage/**, /api/sla/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        # ── Incident Service ─────────────────────────────────────
        - id: incident
          uri: lb://incident-service
          predicates:
            - Path=/api/incidents/**, /api/actions/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        # ── Analytics Service ────────────────────────────────────
        - id: analytics
          uri: lb://analytics-service
          predicates:
            - Path=/api/reports/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        # ── Notification Service ─────────────────────────────────
        - id: notification
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

# JWT secret — must match the same secret used in all services
jwt:
  secret: "3a7f9c2b8e1d4f6a0c5b9e3d7f2a8c1b4e6f0a3d9c7b2e5f8a1d4c6b0e3f7a2d"
  expiration: 86400000  # 24 hours in milliseconds

# Actuator — expose health endpoint
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Eureka client — registers gateway with Eureka and fetches service registry
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.comnet360.gateway: DEBUG