server:
  port: 8086

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://localhost:3306/notification_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: "${DB_PASSWORD:root}"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # JavaMailSender SMTP config
  # Using Gmail SMTP for development ? change for production
  mail:
    host: smtp.gmail.com
    port: 587
    username: "${MAIL_USERNAME:patnalarahul2004@gmail.com}"
    password: "${MAIL_PASSWORD:qewr jowz ccsc ekxi}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    test-connection: false

jwt:
  secret: "${JWT_SECRET:3a7f9c2b8e1d4f6a0c5b9e3d7f2a8c1b4e6f0a3d9c7b2e5f8a1d4c6b0e3f7a2d}"

# Application email config
app:
  mail:
    from: noreply@comnet360.com
    enabled: true    # set to false to disable email sending during dev

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health, info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-NOCORR}] [user=%X{userId:-anon}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-NOCORR}] [user=%X{userId:-anon}] %logger{36} - %msg%n"
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
  level:
    com.comnet360.notification: DEBUG
    org.springframework.mail: DEBUG